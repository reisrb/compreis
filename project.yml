name: ListaDeCompras
options:
  bundleIdPrefix: com.rafaelreis
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""  # preencher com teu Team ID após logar no Xcode

targets:
  ListaDeCompras:
    type: application
    platform: iOS
    sources:
      - path: ListaDeCompras
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rafaelreis.listadecompras
        INFOPLIST_FILE: ListaDeCompras/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies: []
