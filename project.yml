name: Compreis
options:
  bundleIdPrefix: com.rafaelreis
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""  # preencher com teu Team ID após logar no Xcode

targets:
  Compreis:
    type: application
    platform: iOS
    sources:
      - path: Compreis
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rafaelreis.compreis
        INFOPLIST_FILE: Compreis/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - sdk: MapKit.framework
      - sdk: CoreLocation.framework
